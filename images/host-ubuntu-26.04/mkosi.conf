[Include]
Include=../../modules/build/host

[Distribution]
Distribution=ubuntu
Release=resolute
Repositories=main,universe
RepositoryKeyFetch=yes

[Content]
Packages=
	linux-modules-*-generic
	linux-image-generic
	linux-modules-extra-*
	systemd
	systemd-boot-efi
	systemd-resolved
	network-manager
	login.defs
	login
	systemd-journal-remote
	qemu-system
	apt
	ovmf
	xxd
	python3
	python3-dev
	python3-pip
	python3-emoji
	jq
	apt
	avahi-daemon
	g++
	g++-x86-64-linux-gnu

# Remove some of the host kernel modules to bring Ubuntu 26.04 host image size under 1G
KernelModulesExclude=
	# GPU drivers
	nvidia.*
	amdgpu
	i915
	radeon
	nouveau
	drivers/gpu/

	# Bluetooth
	net/bluetooth
	drivers/bluetooth/

	# Wireless networking
	net/wireless/
	drivers/net/wireless/
	net/mac80211/

	# Alternative filesystems - ext4 is sufficient
	reiserfs
	gfs2
	ocfs2
	jfs
	f2fs
	ntfs
	hfs
	udf

	# Audio - not needed for headless VM host
	sound/

	# Media devices (cameras, TV tuners, etc.) - not needed
	drivers/media/

	# Staging drivers - experimental/unmaintained code
	drivers/staging/

	# Amateur radio
	drivers/net/hamradio/

	# ISDN telephony - obsolete technology
	drivers/isdn/

	# Near Field Communication
	drivers/nfc/
	net/nfc/

	# WiMAX - obsolete wireless technology
	drivers/net/wimax/

	# Telephony
	drivers/telephony/

	# IrDA - obsolete infrared technology
	#net/irda/

	# ATM networking
	net/atm/

	# 6LoWPAN - IoT protocol
	net/6lowpan/

	#Advanced  network protocols
	net/ax25/
	net/can/
	net/decnet/
	net/x25/
	net/lapb/
	net/rose/
	net/netrom/
	net/appletalk/
	net/ipx/
	net/phonet/
	net/ieee802154/
	net/caif/
	net/tipc/
	net/rds/

	# InfiniBand/RDMA - high-performance networking not needed
	drivers/infiniband/

	# USB peripheral devices - keep core USB but remove peripherals
	drivers/usb/misc/
	drivers/usb/serial/
	drivers/usb/image/
	drivers/usb/atm/
	drivers/usb/gadget/

	# Input devices - keyboards, mice, touchscreens, joysticks
	drivers/input/joystick/
	drivers/input/tablet/
	drivers/input/touchscreen/
	drivers/input/misc/

	# Industrial I/O - sensors and ADCs
	drivers/iio/

	# LED drivers
	drivers/leds/

	# Memory Technology Devices - flash storage
	drivers/mtd/

	# Multi-Function Devices
	drivers/mfd/

	# Greybus - modular phone hardware
	drivers/greybus/

	# Hardware crypto accelerators - use software crypto
	drivers/crypto/

	# FPGA drivers
	drivers/fpga/

	# Remote processors
	drivers/remoteproc/

	# SPI devices
	drivers/spi/

	# I2C devices (some may be needed, but most peripherals are not)
	drivers/i2c/busses/

	# Watchdog timers - most hardware-specific ones not needed
	drivers/watchdog/

	# Floppy and legacy storage
	drivers/block/floppy.ko
	drivers/block/paride/

	# Gameport
	drivers/input/gameport/

	# Accessibility drivers
	drivers/accessibility/

	# Android drivers
	drivers/android/

[Build]
Environment=VERSION="26.04"
